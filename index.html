<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rank Ibadah Simple</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center;padding:20px}
.card{background:#1e293b;padding:20px;border-radius:15px;max-width:320px;margin:auto}
button{padding:10px;margin:5px;border:none;border-radius:10px;width:100%}
.ok{background:#22c55e}
.no{background:#ef4444}
</style>
</head>
<body>
<div class="card">
<h2 id="rank">Warrior</h2>
<p>Bintang: <span id="star">0</span></p>
<p>Streak: <span id="streak">0</span></p><button class="ok" onclick="add()">Saya Sholat ✅</button> <button class="no" onclick="miss()">Saya Lalai ❌</button> <button onclick="resetSeason()">Reset Season 🔄</button>

</div><script>
let star = parseInt(localStorage.getItem('star')||0);
let streak = parseInt(localStorage.getItem('streak')||0);
let lastDay = localStorage.getItem('day')||"";

const ranks=["Warrior","Elite","Master","Grandmaster","Epic","Legend","Mythic","Immortal"];

function getRank(){
let i=Math.floor(star/5);
if(i>=ranks.length) i=ranks.length-1;
return ranks[i];
}

function update(){
document.getElementById('star').innerText=star;
document.getElementById('streak').innerText=streak;
document.getElementById('rank').innerText=getRank();
localStorage.setItem('star',star);
localStorage.setItem('streak',streak);
}

function add(){
let today=new Date().toDateString();
if(lastDay!==today){
star++;
streak++;
lastDay=today;
localStorage.setItem('day',today);
update();
}
}

function miss(){
streak=0;
star=Math.max(0,star-1);
update();
}

function resetSeason(){
star=0;
streak=0;
localStorage.clear();
update();
}

update();
</script></body>
</html>
